<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatwheel Editor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    .container h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      text-align: center;
      color: #333;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      color: #555;
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1rem;
    }

    .preview {
      background: #f9f9f9;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-family: monospace;
      color: #333;
    }

    button {
      width: 48%;
      padding: 10px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      margin-right: 4%;
    }

    button:last-child {
      margin-right: 0;
    }

    button:hover {
      background: #0056b3;
    }

    .flex-buttons {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chatwheel Editor</h1>

    <div class="flex-buttons">
      <button onclick="setTeam('CT')">CT</button>
      <button onclick="setTeam('T')">T</button>
    </div>

    <label for="playerColor">Player Color</label>
    <select id="playerColor" onchange="updatePreview()">
      <option value="blue">Blue</option>
      <option value="purple">Purple</option>
      <option value="green">Green</option>
      <option value="yellow">Yellow</option>
      <option value="orange">Orange</option>
    </select>

    <label for="playerName">Player Name</label>
    <input type="text" id="playerName" placeholder="Enter player name">
    
    <label for="message">Message</label>
    <input type="text" id="message" placeholder="Enter message">

    <div class="preview" id="preview">
      playerchatwheel CW.1 "Ping Site A ⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀
      [ALL] UC● TCPlayerName: Message
    </div>
    
    <button onclick="copyToClipboard()">Copy to Clipboard</button>
  </div>

  <script>
    const playerInput = document.getElementById('playerName');
    const messageInput = document.getElementById('message');
    const playerColorSelect = document.getElementById('playerColor');
    const preview = document.getElementById('preview');

    let teamCode = '\u000B'; // Default to CT

    function setTeam(team) {
      teamCode = team === 'CT' ? '\u000B' : '\u0009';
      updatePreview();
    }

    function updatePreview() {
      const player = playerInput.value || 'PlayerName';
      const message = messageInput.value || 'Message';
      const colorCode = {
        blue: '\u000B',
        purple: '\u000E',
        green: '\u0004',
        yellow: '\u0009',
        orange: '\u0010',
      }[playerColorSelect.value];

      preview.textContent = `playerchatwheel CW.1 "Ping Site A ⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀⠀
[ALL] ${colorCode}● ${teamCode}${player}: ${message}`;
    }

    function copyToClipboard() {
  const textToCopy = preview.textContent;
  navigator.clipboard.writeText(textToCopy).catch(err => {
    console.error('Failed to copy:', err);
  });
}



    playerInput.addEventListener('input', updatePreview);
    messageInput.addEventListener('input', updatePreview);
    playerColorSelect.addEventListener('change', updatePreview);
  </script>
</body>
</html>
