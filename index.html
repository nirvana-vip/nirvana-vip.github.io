<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐛</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="images/favicon.png" type="image/png">

    

</head>

<body onclick="playAudio()">
    <h1>Σ>―(つ﹏✿)→      (╯︵╰,)   ♪♬  ♪   (－‸ლ)  ✺</h1>
    <img src="images/teke.png" alt="teke" style="max-width: 100%; height: auto;">
    
    <iframe 
        width="960" 
        height="540"  
        src="https://www.youtube.com/embed/XnbenU9eGhE?si=Ui6iegHrUZkFyvcv" 
        title="guwop" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>

    <img src="images/cat.png" alt="cat" style="max-width: 100%; height: auto;">

    <iframe 
        width="960" 
        height="540" 
        src="https://www.youtube.com/embed/N-cabnvav6A?si=5ImuszJlMPLXRTSK" 
        title="wave" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>

    <img src="images/ea.png" alt="ea" style="width: 200px; height: auto;">


    <iframe 
        width="960" 
        height="540"  
        src="https://www.youtube.com/embed/lT9jcpYfs8E?si=4zN3mgkKh_Z8XTrO" 
        title="wave" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>

    <img src="images/smurffuneral.png" alt="smurf funeral" style="max-width: 100%; height: auto;">

    <img src="images/minotaur.png" alt="minotaur" style="max-width: 100%; height: auto;">

    <img src="images/wheat1.png" alt="Overlay Image" class="overlay">

    <img src="images/skull.png" alt="Overlay Image" class="overlay2">

    <audio id="noise-audio" autoplay loop>
        <source src="audio/noise1.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>

    <audio id="gunshot-audio">
        <source src="audio/gunshot.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>

    <script>
        function playAudio() {
            const noiseAudio = document.getElementById('noise-audio');
            const gunshotAudio = document.getElementById('gunshot-audio');
            
            // Play gunshot audio
            gunshotAudio.play();

            // Check if noise audio is not already playing and start it
            if (noiseAudio.paused) {
                noiseAudio.play();
            }
        }
    </script>

</body>
</html>
